<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Pulse | DRF + JS</title>
    {% load static %}
    <!-- Bootstrap para não perder tempo com alinhamento -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f7f6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .stats-card {
            border-left: 5px solid #0d6efd;
            transition: transform 0.2s;
        }

        .stats-card:hover {
            transform: translateY(-5px);
        }

        .task-card {
            border-radius: 10px;
            border: none;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 15px;
        }

        .urgency-CRITICAL {
            border-right: 8px solid #dc3545;
        }

        .urgency-HIGH {
            border-right: 8px solid #fd7e14;
        }

        .urgency-MEDIUM {
            border-right: 8px solid #ffc107;
        }

        .urgency-LOW {
            border-right: 8px solid #198754;
        }

        .card.task-card {
            transition: transform 0.2s;
        }

        .card.task-card:hover {
            transform: translateY(-5px);
        }
    </style>
</head>

<body>
    <div class="container mt-5">
        <h2 class="mb-4 text-center">Task Pulse Dashboard</h2>
        <div class="d-flex justify-content-center">
            {% if user.is_authenticated %}
                <h4 class="mb-4 text-center text-muted">Olá, <strong>{{ user.username }}</strong></h3>
                <form action="{% url 'logout' %}" method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-outline-danger btn-sm">Sair</button>
                </form>
            {% else %}
                <h4 class="mb-4 text-center">Não logado</h3>
                <a href="{% url 'login' %}" class="btn btn-outline-light btn-sm">Entrar</a>
            {% endif %}
        </div>

        <!-- Dashboard de Status (Uma linha completa) -->
        <div class="row mb-4">
            <div class="col-md-4">
                <div class="card stats-card p-3 shadow-sm">
                    <h6 class="text-muted">Total de Tarefas</h6>
                    <h3 id="total-tasks">0</h3>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card stats-card p-3 shadow-sm" style="border-left-color: #ffc107;">
                    <h6 class="text-muted">Pendentes</h6>
                    <h3 id="pending-tasks">0</h3>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card stats-card p-3 shadow-sm" style="border-left-color: #198754;">
                    <h6 class="text-muted">Concluídas</h6>
                    <h3 id="completed-tasks">0</h3>
                </div>
            </div>
        </div>

        <!-- Área Principal: Formulário + Lista (Lado a Lado) -->
        <div class="row">
            <!-- Coluna do Formulário (4/12) -->
            <div class="col-md-4 mb-4">
                <div class="card p-4 shadow-sm">
                    <h5>Nova Tarefa</h5>
                    <hr>
                    {% csrf_token %}
                    <form id="task-form">
                        <div class="mb-3">
                            <label class="form-label">Título</label>
                            <input name="title" type="text" id="title" class="form-control"
                                placeholder="O que precisa ser feito?" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Descrição</label>
                            <input name="description" type="text" id="description" class="form-control"
                                placeholder="Descrição da tarefa.">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Data de Entrega</label>
                            <input name="due_date" type="datetime-local" id="due_date" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Adicionar Tarefa</button>
                    </form>
                </div>
            </div>

            <!-- Coluna da Lista (8/12) -->
            <div class="col-md-8">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5>Minhas Tarefas</h5>
                    <select id="filter-status" class="form-select w-25">
                        <option value="">Todas</option>
                        <option value="PE">Pendentes</option>
                        <option value="DN">Concluídas</option>
                    </select>
                </div>
                <div id="task-list">
                    <p class="text-muted">Carregando tarefas...</p>
                </div>
            </div>
        </div> <!-- Fim da Row principal -->
    </div> <!-- Fim do Container -->

    <!-- Modal de Edição -->
    <div class="modal fade" id="editTaskModal" tabindex="-1" aria-labelledby="editTaskModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="editTaskModalLabel">Editar Tarefa</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="edit-task-form">
                        <!-- ID Oculto: Essencial para o PATCH saber qual tarefa editar -->
                        <input type="hidden" id="edit-task-id">

                        <div class="mb-3">
                            <label for="edit-title" class="form-label">Título</label>
                            <input name="edit-title" type="text" class="form-control" id="edit-title" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Descrição</label>
                            <input name="edit-description" type="text" id="edit-description" class="form-control"
                                placeholder="Descrição da tarefa.">
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="edit-status" class="form-label">Status</label>
                                <select class="form-select" id="edit-status">
                                    <option value="PE">Pendente</option>
                                    <option value="DN">Concluída</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="edit-due-date" class="form-label">Data de Entrega</label>
                                <input type="datetime-local" class="form-control" id="edit-due-date" required>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" form="edit-task-form" class="btn btn-primary">Salvar Alterações</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="/static/dashboard/js/dashboard.js"></script>
</body>

</html>
